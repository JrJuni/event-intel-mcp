# event-intel-mcp default settings. User overrides go in ~/.event-intel/config.yaml
# (loader to be added in S2/S4).

schema_version: 1

extraction:
  max_chunks_per_event: 12        # Hard cap on chunked LLM extraction calls (review R2-#7)
  max_chars_per_chunk: 8000        # ~2k tokens per chunk
  source_snippet_min_chars: 20     # Below this, candidate is dropped (review R2-#2)
  extraction_confidence_min: 0.6   # Below this, candidate flagged needs_review
  csv_short_circuit: true          # #16-①: CSV with a detectable name column converts rows directly (0 LLM calls);
                                   # detection failure falls back to chunked LLM extraction. false = always LLM.

search:
  provider: auto                   # auto (FREE Brave key if set → brave, else keyless ddgs+RSS pool — Brave control 2026-06-11: big-co met 7/10 vs keyless 1–3/10) | ddgs | searxng | brave
  searxng_url: ""                  # required when provider=searxng (configured in a later slice)
  min_interval_ms: 1100            # ddgs: process-wide min gap between requests (DDG rate-limits ~20-30/min)
  max_retries: 5                   # ddgs: backoff attempts before degrading. PROVISIONAL (R3): 0 rate-limits in ~900 queries at this throttle — ceiling untested, kept as safety net (retry-playbook §1)
  ddgs_backend: auto               # ddgs engine(s); "auto" shuffles all per call, or comma-list (news lane: duckduckgo, bing, yahoo)
  news_fallback: bing_news_rss     # keyless NEWS fallback/1st supplement lane (bing_news_rss | google_news_rss | none); ddgs-only.
                                   # Bing FIRST: its items carry DIRECT publisher URLs — Google's /rss/articles/ wrappers are
                                   # robots-denied for body fetch (measured 30/30 on 2026-06-11), so they add listed-but-bodiless news.
  news_supplement_min: 10          # #15-1: top up via the lane pool when ddgs returns < min(this, count) news (supply ceiling fix); 0 = off
  news_extra_lanes: google_news_rss  # additional keyless news lanes after news_fallback (comma list)

enrichment:
  max_companies: 30                # Per-event cap on enriched exhibitors
  count_web: 5                     # web results per official-URL query (legacy alias: brave_count_web)
  count_news: 20                   # news results per company (user decision 2026-06-11, backlog #15: 12 left big-co bodied-news at 5–9 vs the ≥10 bar; legacy alias: brave_count_news)
  news_days_back: 180
  news_body:                       # B1 — article body fetch lane (success criterion ①)
    enabled: true
    max_per_company: 20            # body fetches per company (gated news only; raised with count_news so the bodied ceiling isn't capped below the ≥10 bar)
    max_bytes_per_page: 1048576    # hard streaming byte cap per article (1 MiB)
    timeout_s: 10
    min_body_chars: 400            # below this → snippet-only (too thin to gate/score)
    cache_ttl_days: 14             # fetched bodies reused across runs (URL-keyed)
    max_retries: 1                 # R3 data-derived: ONE retry for transient shapes (429/5xx/transport) only; 4xx never retried (retry-playbook §2)
    retry_pause_s: 2
  news_entity_gate:                # C2 — homonym disambiguation (Dust/Ramp/Chroma false positives)
    enabled: true                  # ambiguous single-common-word names require ctx-term co-occurrence; fail-open without context
  query_rescue:                    # N4 — LLM proposes alternate queries for blocked-and-empty companies (fetch stays deterministic)
    enabled: true
    max_companies: 5               # max LLM proposal calls per event
    max_queries: 3                 # max alternate queries per company
  triage:                          # Y1D D2 — LLM roster triage when the extracted roster > max_companies:
    enabled: true                  # score the FULL roster for product-domain relevance (batched, names+snippets
                                   # only) and enrich the top-max_companies instead of "the first 30 in page order"
                                   # (p7 Siemens 2,885 exhibitors → coverage 1% without this). Absent key = off.
                                   # Total LLM failure degrades to the old first-N behaviour.
    batch_size: 120                # companies per triage call
  fetch_timeout_seconds: 10
  fetch_body_max_chars: 2000
  cache_enabled: true              # Cache search responses per (provider, query, kind) hash
  cache_ttl_days: 7                # Search-cache freshness (Phase 18W P2-1). 0 = never reuse, null = infinite
  resume_ttl_days: 7               # Resume-row freshness. Changed input (name/url/snippet/confidence/config) re-enriches regardless
  official_url_levenshtein_threshold: 0.7
  evidence_queries:                # Phase 18V item 1 — extra typed-evidence queries
    product: true                  # "{name}" product → product_page evidence
    partners: true                 # "{name}" partners → partner_page evidence
    press_release: true            # "{name}" press release → press_release evidence
    max_per_company: 3             # Per-company cap — deterministic, order-independent (review #3)
    max_extra_calls_per_event: 0   # Optional event-wide ATTEMPT ceiling (0 = off; max_companies bounds cost)

scoring:
  capability_fit_mode: llm           # Y1D D1. llm (default) = explicit LLM fit judgment per company,
                                     # cosine kept as automatic per-company fallback on any failure.
                                     # cosine = escape hatch (offline / zero-LLM-cost runs).
                                     # Why: bge-m3 cosine measured dead-flat — GTC×MongoDB target 0.54
                                     # vs bad_fit 0.50 — the 0.30-weight dimension carried no signal.
  weights:
    capability_fit: 0.30
    source_confidence: 0.15
    buying_signal: 0.15
    website_verification: 0.10
    category_fit: 0.15
    competitor_penalty: -0.35
    bad_fit_penalty: -0.25

  retrieval:
    # Fit retrieval pools (Phase 18V 4b). capability_fit averages over the larger
    # capability pool; competitor/bad_fit penalties use the max similarity from
    # the negative pool, fired only at/above negative_sim_threshold (a count over
    # a negative-only pool would saturate to top_k for everyone).
    top_k: 5
    capability_top_k: 20
    capability_aggregate_top_n: 3   # capability_fit = mean of top-N strongest matches, not all (review #5)
    negative_sim_threshold: 0.5

  target_mode:
    # Phase 18V item 2. Per-mode multipliers on the competitor/bad_fit penalty
    # weights. The effective mode is resolved at build time
    # (build_event arg > user config target_mode > card target_mode > customer).
    # No bonus anywhere — factors only scale penalties down, for reproducible
    # acceptance (review round-2 #6).
    # Mode policy (Phase 18W P2-3): competitor is negative only in customer;
    # bad_fit is negative in EVERY mode (a card-declared unfit company shouldn't
    # rank regardless of mode), so ecosystem keeps bad_fit_penalty_factor 1.0.
    customer:   {competitor_penalty_factor: 1.0, bad_fit_penalty_factor: 1.0}
    partner:    {competitor_penalty_factor: 0.0, bad_fit_penalty_factor: 1.0}
    ecosystem:  {competitor_penalty_factor: 0.0, bad_fit_penalty_factor: 1.0}

  cjk_tokenizer:
    # CJK category_fit tokenizer (Phase 18W P2-4). bigram (default) is cold-start
    # safe but over-matches on 2-char windows. morphological uses janome (JP) /
    # jieba (CN) — install the optional extra: pip install -e ".[cjk]".
    mode: bigram               # bigram | morphological
    language: auto             # auto | ja | zh | ko — SOURCE text language, independent of output lang
    han_default: zh            # auto's choice for ambiguous pure-Han runs (zh | ja)

  buying_signal:
    # News-driven buying signal (Phase 18V 4a). Half-life of the recency bonus:
    # an article published `recency_half_life_days` ago contributes half the
    # freshness bonus of a same-day one. Generic (non-name-matched) news is
    # downweighted in scoring/dimensions.py regardless of this value.
    recency_half_life_days: 180

  tier_rules:
    # Floor: has_official_url + has_news_signals (0/1/2). snippet always present after extraction.
    S:
      min_final_score: 7.5
      evidence_floor_min: 2        # url + news both
    A:
      min_final_score: 6.0
      evidence_floor_min: 1        # url OR news
    B:
      min_final_score: 4.0
      evidence_floor_min: 0        # snippet-only allowed
    C:
      min_final_score: 0.0
      evidence_floor_min: 0

llm:
  provider: anthropic              # anthropic | openai | chatgpt_oauth
  reference_pricing:               # Y1D D0 — per-run cost conversion baselines ($/1M tokens).
    # Applied to EVERY run's token totals regardless of the provider actually used,
    # so a free ChatGPT-OAuth run still reports "what this would have cost".
    # Verified 2026-06-11 against the official pricing pages (gpt-5.5-mini does
    # not exist; gpt-5.4-mini is the current mini tier).
    claude-sonnet-4-6: {input: 3.00, output: 15.00}
    gpt-5.4-mini:      {input: 0.75, output: 4.50}
    claude-haiku-4-5:  {input: 1.00, output: 5.00}   # verified 2026-06-11, official pricing page
  draft_cards_model: claude-sonnet-4-6
  extract_exhibitors_model: claude-sonnet-4-6
  rationale_model: claude-sonnet-4-6
  triage_model: claude-haiku-4-5     # #16-④ right-sizing. PROVISIONAL — quality unverified (offline-only phase);
                                     # bounded relevance scoring, not generation. Absent key = extraction model.
  fit_model: claude-haiku-4-5        # #16-④ right-sizing. PROVISIONAL — same caveat. Absent key = extraction model.
                                     # NOTE: both are no-ops under provider=chatgpt_oauth (single OAuth model).
  draft_cards_max_tokens: 4096
  extract_max_tokens: 4096
  rationale_max_tokens: 256
  openai_model: gpt-4.1                    # used when provider=openai (official key-based API)
  chatgpt_oauth_model: gpt-5.5             # used when provider=chatgpt_oauth (alt: gpt-5.4)
  chatgpt_oauth_reasoning_effort: low      # low | medium | high (Codex Responses reasoning effort)

acquisition:
  # Agentic acquisition ladder (C7). Caps are enforced, not advisory.
  max_bytes_per_fetch: 5000000        # per-response streaming byte cap (raw_fetch max_bytes)
  max_external_bundles: 8             # <script src> bundles probed for endpoints (longest first)
  max_candidate_endpoints: 5          # candidate endpoints tried per probe (probe.MAX_CANDIDATES)
  max_http_calls_per_acquire: 20      # total HTTP calls per acquire (landing+bundles+endpoints+pages)
  rung_timeout_seconds: 20            # per-fetch timeout (raw_fetch default)
  overall_deadline_seconds: 60        # wall-clock monotonic deadline across the whole acquire
  bundle_discovery_enabled: true      # rung that scans external bundles for endpoint literals
  roster_min_repeated_objects: 5      # structural roster validator: min repeated company objects
  roster_min_unique_names: 5          # structural roster validator: min unique company names
  cumulative_max_bytes: 20000000      # cumulative byte cap across the whole acquire (vs per-response)
  per_rung_http_quota: 6              # advisory per-rung HTTP ceiling
  reserved_calls_bundle_rung: 4       # calls reserved so a wrong prior can't starve the bundle rung
  roster_max_depth: 4                 # JSON nested-search depth cap
  roster_max_nodes: 2000              # JSON visited-node cap

paths:
  chroma_dir: ~/.event-intel/chroma
  outputs_dir: outputs
